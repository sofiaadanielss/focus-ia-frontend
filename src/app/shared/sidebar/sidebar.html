@if (!menuOpen()) {
  <button class="hidden mobile:flex fixed top-4 left-4 z-[60] w-10 h-10 bg-[#6d28d9] rounded-xl items-center justify-center border-none cursor-pointer shadow-lg"
          (click)="toggleMenu()">
    <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
}

@if (menuOpen()) {
  <div class="hidden mobile:block fixed inset-0 bg-black/40 z-[49]" (click)="closeMenu()"></div>
}

<aside class="w-[240px] h-full bg-[#6d28d9] flex flex-col px-5 py-8 flex-shrink-0 mobile:fixed mobile:top-0 mobile:left-0 mobile:z-[50] mobile:transition-transform mobile:duration-300"
       [class.mobile:-translate-x-full]="!menuOpen()"
       [class.mobile:translate-x-0]="menuOpen()">

  <div class="flex items-center justify-between mb-10 pl-1">
    <div class="flex items-center gap-3">
      <img src="/assets/logo.png" class="w-8 h-auto invert" />
      <span class="text-white font-display font-extrabold text-lg tracking-wide">Focus AI</span>
    </div>
    <button class="hidden mobile:flex w-8 h-8 items-center justify-center text-white/60 hover:text-white bg-transparent border-none cursor-pointer rounded-lg hover:bg-white/10 transition-colors"
            (click)="closeMenu()">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <nav class="flex flex-col gap-1 flex-1">
    <a class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm no-underline transition-colors"
       [class]="isActive('/dashboard') ? 'font-semibold text-white bg-white/15' : 'font-medium text-white/70 hover:bg-white/10 hover:text-white'"
       (click)="navigate('/dashboard')">
      <svg class="w-[18px] h-[18px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Panel
    </a>
    <a class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm no-underline transition-colors"
       [class]="isActive('/profile') ? 'font-semibold text-white bg-white/15' : 'font-medium text-white/70 hover:bg-white/10 hover:text-white'"
       (click)="navigate('/profile')">
      <svg class="w-[18px] h-[18px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Perfil
    </a>
    <a class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm no-underline transition-colors"
       [class]="isActive('/distractors') ? 'font-semibold text-white bg-white/15' : 'font-medium text-white/70 hover:bg-white/10 hover:text-white'"
       (click)="navigate('/distractors')">
      <svg class="w-[18px] h-[18px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
      Distractores
    </a>
    <a class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm no-underline transition-colors"
       [class]="isActive('/history') ? 'font-semibold text-white bg-white/15' : 'font-medium text-white/70 hover:bg-white/10 hover:text-white'"
       (click)="navigate('/history')">
      <svg class="w-[18px] h-[18px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Histórico
    </a>
    <a class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm no-underline transition-colors"
       [class]="isActive('/adhd-questions') ? 'font-semibold text-white bg-white/15' : 'font-medium text-white/70 hover:bg-white/10 hover:text-white'"
       (click)="navigate('/adhd-questions')">
      <svg class="w-[18px] h-[18px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11.5a2.5 2.5 0 1 1 5 0c0 1.5-2.5 2-2.5 4"/><circle cx="11.5" cy="18" r="0.5" fill="currentColor"/><circle cx="12" cy="12" r="10"/></svg>
      Test TDAH
    </a>
    <a class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm no-underline transition-colors"
       [class]="isActive('/iq') ? 'font-semibold text-white bg-white/15' : 'font-medium text-white/70 hover:bg-white/10 hover:text-white'"
       (click)="navigate('/iq')">
      <svg class="w-[18px] h-[18px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Test IQ
    </a>
  </nav>

  <button class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-white/60 hover:text-white hover:bg-white/10 transition-colors bg-transparent border-none cursor-pointer font-sans" (click)="logout()">
    <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Cerrar Sesión
  </button>

</aside>
