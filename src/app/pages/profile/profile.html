<div class="profile-page">
  <div class="profile-card">

    
    <div class="card-header">
      <span class="brand">Focus AI</span>
      <span class="success-badge" *ngIf="successMessage">{{ successMessage }}</span>
    </div>

    
    <div class="avatar-section">
      <div class="avatar-circle">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="18" r="9" stroke="#7c3aed" stroke-width="2.5" fill="none"/>
          <path d="M6 42 C6 32 42 32 42 42" stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="avatar-name">{{ currentName || 'Nombre' }}</p>
    </div>

    
    <form (ngSubmit)="onSubmit()" novalidate class="profile-form">

      <div class="field">
        <label>Nombre de usuario</label>
        <input
          [(ngModel)]="name"
          name="name"
          type="text"
          [class.input-error]="nameError"
          (blur)="validateName()"
          (input)="clearSuccess()"
        />
        <span class="error-msg" *ngIf="nameError">{{ nameError }}</span>
      </div>

      <div class="field">
        <label>Correo Electrónico</label>
        <input
          [(ngModel)]="email"
          name="email"
          type="text"
          [class.input-error]="emailError"
          (blur)="validateEmail()"
          (input)="clearSuccess()"
        />
        <span class="error-msg" *ngIf="emailError">{{ emailError }}</span>
      </div>

      <p class="server-error" *ngIf="serverError">{{ serverError }}</p>

      <button
        type="submit"
        class="btn-save"
        [disabled]="isSubmitDisabled()"
        [class.btn-disabled]="isSubmitDisabled()"
      >
        {{ loading ? 'Guardando...' : 'Guardar' }}
      </button>

    </form>

  </div>
</div>
