<div class="login-page">

  <div class="brand-panel">
    <p class="brand-label">Focus AI</p>
    <h2 class="brand-tagline">Mejora tu<br>concentración</h2>
  </div>

  <div class="form-panel">

    <div class="bulb-icon">
      <svg viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M40 6 C22 6 8 20 8 38 C8 51 16 62 28 68 L28 80 L52 80 L52 68 C64 62 72 51 72 38 C72 20 58 6 40 6Z"
          stroke="#9ca3af" stroke-width="2.5" fill="none"/>
        <path d="M30 34 Q35 27 40 34 Q45 41 50 34" stroke="#9ca3af" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M28 44 Q34 37 40 44 Q46 51 52 44" stroke="#9ca3af" stroke-width="2" fill="none" stroke-linecap="round"/>
        <line x1="30" y1="83" x2="50" y2="83" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="33" y1="90" x2="47" y2="90" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="36" y1="97" x2="44" y2="97" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>

    <h1 class="form-title">Inicio de Sesión</h1>

    <form (ngSubmit)="onSubmit()" novalidate class="login-form">

      <div class="field">
        <label>Correo Electrónico</label>
        <input
          [(ngModel)]="email"
          name="email"
          type="text"
          [class.input-error]="emailError"
          (blur)="validateEmail()"
        />
        <span class="error-msg" *ngIf="emailError">{{ emailError }}</span>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          [class.input-error]="passwordError"
          (blur)="validatePassword()"
        />
        <span class="error-msg" *ngIf="passwordError">{{ passwordError }}</span>
        <a href="#" class="forgot-link">Olvidé mi contraseña</a>
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="isSubmitDisabled()"
        [class.btn-disabled]="isSubmitDisabled()"
      >
        {{ loading ? 'Iniciando...' : 'Iniciar Sesión' }}
      </button>

      <p class="server-error" *ngIf="serverError">{{ serverError }}</p>
      <p class="success-msg" *ngIf="successMessage">{{ successMessage }}</p>
    </form>

    <p class="register-link">
      No tienes cuenta? <a routerLink="/register">Crear Cuenta</a>
    </p>

  </div>
</div>
