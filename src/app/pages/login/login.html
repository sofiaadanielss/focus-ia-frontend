<div class="login-page">
  
  <div class="brand-panel">
    <p class="brand-label">Focus AI</p>
    <h2 class="brand-tagline">Mejora tu<br>concentración</h2>
  </div>

  <div class="form-panel">

  <div class="bulb-icon">
    <img src="/logo.png" class="logo-form">
  </div>

    <h1 class="form-title">Inicio de Sesión</h1>

    <form (ngSubmit)="onSubmit()" novalidate class="login-form">

      <div class="field">
        <label>Correo Electrónico</label>
        <input
          [(ngModel)]="email"
          name="email"
          type="text"
          [class.input-error]="emailError"
          (blur)="validateEmail()"
        />
        <span class="error-msg" *ngIf="emailError">{{ emailError }}</span>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          [class.input-error]="passwordError"
          (blur)="validatePassword()"
        />
        <span class="error-msg" *ngIf="passwordError">{{ passwordError }}</span>
        <a href="#" class="forgot-link">Olvidé mi contraseña</a>
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="isSubmitDisabled()"
        [class.btn-disabled]="isSubmitDisabled()"
      >
        {{ loading ? 'Iniciando...' : 'Iniciar Sesión' }}
      </button>

      <p class="server-error" *ngIf="serverError">{{ serverError }}</p>
      <p class="success-msg" *ngIf="successMessage">{{ successMessage }}</p>
    </form>

    <p class="register-link">
      No tienes cuenta? <a routerLink="/register">Crear Cuenta</a>
    </p>

  </div>
</div>
