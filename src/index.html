<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Focus IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .error {
        color: #ef4444;
        font-size: 0.875rem;
        margin-top: 4px;
        display: block;
      }
      .hint {
        color: #71717a;
        font-size: 0.875rem;
        margin-top: 4px;
        display: block;
      }
      .input-error {
        border-color: #ef4444 !important;
      }
    </style>
  </head>
  <body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center font-sans">
    <div class="max-w-md w-full bg-zinc-900 p-10 rounded-3xl shadow-2xl">

      <h1 class="text-4xl font-bold text-center mb-2 text-emerald-400">Focus IA</h1>
      <p class="text-center mb-8 text-zinc-400">Crea tu cuenta para empezar</p>

      <form id="registerForm" class="space-y-6">
        <div>
          <label class="block text-sm mb-1">Nombre de usuario <span class="text-red-400">*</span></label>
          <input
            id="name"
            type="text"
            required
            class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500"
          />
          <span id="nameError" class="error" style="display:none"></span>
        </div>

        <div>
          <label class="block text-sm mb-1">Correo electrónico <span class="text-red-400">*</span></label>
          <input
            id="email"
            type="text"
            required
            placeholder="ej. TuCorreo@correo.com"
            class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500"
          />
          <span id="emailError" class="error" style="display:none"></span>
        </div>

        <div>
          <label class="block text-sm mb-1">Contraseña <span class="text-red-400">*</span></label>
          <input
            id="password"
            type="password"
            required
            class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500"
          />
          <span id="passwordError" class="hint">Mínimo 8 caracteres</span>
        </div>

        <button
          id="submitBtn"
          type="submit"
          disabled
          class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-semibold text-lg disabled:bg-zinc-700 disabled:cursor-not-allowed transition-colors"
        >
          Registrarse
        </button>

        <p id="serverError" class="hidden text-red-400 text-sm text-center mt-2"></p>
      </form>

      <div id="successModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50">
        <div class="bg-white text-black rounded-3xl p-8 shadow-2xl text-center max-w-xs w-full mx-4">
          <div class="flex items-center justify-center mb-4">
            <div class="bg-emerald-500 rounded-full w-10 h-10 flex items-center justify-center mr-3">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
            <p class="font-semibold text-lg">Cuenta creada con éxito</p>
          </div>
          <button id="okBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white py-3 rounded-2xl font-semibold transition-colors">
            OK
          </button>
        </div>
      </div>

    </div>

    <script>
      const form = document.getElementById('registerForm');
      const btn = document.getElementById('submitBtn');
      const successModal = document.getElementById('successModal');
      const okBtn = document.getElementById('okBtn');

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      function showError(fieldId, errorId, message) {
        const field = document.getElementById(fieldId);
        const error = document.getElementById(errorId);
        field.classList.add('input-error');
        error.textContent = message;
        error.className = 'error';
        error.style.display = 'block';
      }

      function clearError(fieldId, errorId, hint = '') {
        const field = document.getElementById(fieldId);
        const error = document.getElementById(errorId);
        field.classList.remove('input-error');
        if (hint) {
          error.textContent = hint;
          error.className = 'hint';
        } else {
          error.textContent = '';
          error.style.display = 'none';
        }
      }

      function toggleButton() {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value.trim();
        btn.disabled = !(name && email && pass);
      }

      document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', toggleButton);
      });

      document.getElementById('name').addEventListener('blur', () => {
        const val = document.getElementById('name').value.trim();
        if (!val) {
          showError('name', 'nameError', 'El nombre de usuario es obligatorio');
        } else {
          clearError('name', 'nameError');
        }
      });

      document.getElementById('email').addEventListener('blur', () => {
        const val = document.getElementById('email').value.trim();
        if (!val) {
          showError('email', 'emailError', 'El correo electrónico es obligatorio');
        } else if (!isValidEmail(val)) {
          showError('email', 'emailError', 'Utiliza un correo válido');
        } else {
          clearError('email', 'emailError');
        }
      });

      document.getElementById('password').addEventListener('blur', () => {
        const val = document.getElementById('password').value;
        if (!val) {
          showError('password', 'passwordError', 'La contraseña es obligatoria');
        } else if (val.length < 8) {
          showError('password', 'passwordError', 'Mínimo 8 caracteres');
        } else {
          clearError('password', 'passwordError', 'Mínimo 8 caracteres');
        }
      });

      function validateForm() {
        let valid = true;

        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!name) {
          showError('name', 'nameError', 'El nombre de usuario es obligatorio');
          valid = false;
        } else {
          clearError('name', 'nameError');
        }

        if (!email) {
          showError('email', 'emailError', 'El correo electrónico es obligatorio');
          valid = false;
        } else if (!isValidEmail(email)) {
          showError('email', 'emailError', 'Utiliza un correo válido');
          valid = false;
        } else {
          clearError('email', 'emailError');
        }

        if (!password) {
          showError('password', 'passwordError', 'La contraseña es obligatoria');
          valid = false;
        } else if (password.length < 8) {
          showError('password', 'passwordError', 'Mínimo 8 caracteres');
          valid = false;
        } else {
          clearError('password', 'passwordError', 'Mínimo 8 caracteres');
        }

        return valid;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!validateForm()) return;

        btn.disabled = true;
        btn.textContent = 'Registrando...';
        document.getElementById('serverError').classList.add('hidden');

        const data = {
          name: document.getElementById('name').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        };

        try {
       const res = await fetch('https://backend-focus-ia-production.up.railway.app/auth/register', {
         method: 'POST',
         headers: { 'Content-Type': 'application/json' },
         body: JSON.stringify(data),
});

          const result = await res.json();

          if (res.ok) {
            form.reset();
            toggleButton();
            clearError('name', 'nameError');
            clearError('email', 'emailError');
            clearError('password', 'passwordError', 'Mínimo 8 caracteres');
            successModal.classList.remove('hidden');
          } else {
            const detail = result.detail?.toLowerCase() ?? '';

            if (detail.includes('email')) {
              showError('email', 'emailError', 'Este correo ya está registrado');
            } else if (detail.includes('password')) {
              showError('password', 'passwordError', 'Mínimo 8 caracteres');
            } else {
              showError('email', 'emailError', result.detail || 'Error al registrar');
            }
          }
        } catch (err) {
          console.error(err);
          const serverError = document.getElementById('serverError');
          serverError.textContent = 'Error de conexión con el servidor. ¿Está corriendo el backend?';
          serverError.classList.remove('hidden');
        } finally {
          btn.textContent = 'Registrarse';
          btn.disabled = false;
          toggleButton();
        }
      });

      okBtn.addEventListener('click', () => {
        successModal.classList.add('hidden');
        window.location.href = 'login.html';
      });
    </script>
  </body>
</html>
